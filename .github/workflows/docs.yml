name: Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build docs and translation catalogs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync docs environment
        run: uv sync --locked

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2@0.18.1

      - name: Build English HTML
        run: uv run --locked sphinx-build -b html . _build/html/en

      - name: Extract gettext catalogs
        run: SOURCE_DATE_EPOCH=0 uv run --locked sphinx-build -b gettext . _build/gettext

      - name: Check zh_CN catalogs are current
        run: |
          uv run --locked sphinx-intl update -p _build/gettext -l zh_CN --locale-dir locales
          uv run --locked python tools/i18n/normalize_po_files.py
          git diff --exit-code -- locales

      - name: Build zh_CN HTML
        run: uv run --locked sphinx-build -b html -D language=zh_CN . _build/html/zh_CN

      - name: Report zh_CN catalog status
        run: uv run --locked python tools/i18n/catalog_status.py

      - name: Check external links advisory
        continue-on-error: true
        run: uv run --locked sphinx-build -b linkcheck . _build/linkcheck

      - name: Upload HTML previews
        uses: actions/upload-artifact@v4
        with:
          name: guidebook-html-previews
          path: _build/html
